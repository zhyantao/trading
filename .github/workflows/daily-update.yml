name: Daily Data Update

on:
  schedule:
    # Runs at 18:30 UTC (2:30 AM Beijing time) daily
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chinese font (for matplotlib charts)
        run: sudo apt-get update && sudo apt-get install -y fonts-wqy-microhei

      - name: Run daily pipeline
        run: python3 src/daily_run.py

      - name: Generate static pages
        run: python3 src/generate_static.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily data update"
            git push origin master
          fi
