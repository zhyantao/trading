<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流水线 - 量化交易研究</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>

<nav>
    <div class="nav-inner">
        <span class="brand">量化信号</span>
        <input type="checkbox" id="nav-toggle">
        <label for="nav-toggle" class="nav-toggle-btn" aria-label="菜单">
            <span></span><span></span><span></span>
        </label>
        <div class="nav-links">
            <a href="index.html" class="">总览</a>
            <a href="signals.html" class="">每日信号</a>
            <a href="holdings.html" class="">我的持仓</a>
            <a href="managers.html" class="">经理排名</a>
            <a href="funds.html" class="">基金排名</a>
            <a href="elite.html" class="">绩优标的</a>
            <a href="backtest.html" class="">回测</a>
            <a href="pipeline.html" class="active">流水线</a>
        </div>
        
        <select id="date-select" class="nav-date-select" onchange="onDateChange(this.value)" aria-label="选择数据日期">
            <option value="">📅 最新</option>
            
            <option value="20260630" selected>2026-06-30</option>
            
            <option value="20260517" >2026-05-17</option>
            
        </select>
        
    </div>
</nav>

<div class="container">
    
<h1 class="page-title">数据处理流水线</h1>

<div class="card">
    <div class="card-header">流水线步骤（共 7 步）</div>
    <div style="font-size:13px; color:var(--text-secondary); margin-bottom:16px;">
        请<a href="https://github.com/zhyantao/trading-bot">本地运行</a>生成最新数据。
    </div>
    <div class="pipeline-steps">
        <div class="pipeline-step">
            <div class="step-num">1</div>
            <div class="step-info">
                <div class="step-name">基金经理-基金收益率明细</div>
                <div class="step-desc">拉取全市场基金经理+基金收益率字段</div>
            </div>
        </div>
        <div class="pipeline-step">
            <div class="step-num">2</div>
            <div class="step-info">
                <div class="step-name">基金经理排名</div>
                <div class="step-desc">按近1年收益率+多基金简单平均排名</div>
            </div>
        </div>
        <div class="pipeline-step">
            <div class="step-num">3</div>
            <div class="step-info">
                <div class="step-name">基金年化收益率排序</div>
                <div class="step-desc">计算成立来复合年化并排序</div>
            </div>
        </div>
        <div class="pipeline-step">
            <div class="step-num">4</div>
            <div class="step-info">
                <div class="step-name">基金-经理关联表</div>
                <div class="step-desc">关联基金年化与经理排名，过滤新基金</div>
            </div>
        </div>
        <div class="pipeline-step">
            <div class="step-num">5</div>
            <div class="step-info">
                <div class="step-name">绩优经理筛选+投资标的</div>
                <div class="step-desc">筛选绩优经理，抓取基金Top3和股票Top10</div>
            </div>
        </div>
        <div class="pipeline-step">
            <div class="step-num">6</div>
            <div class="step-info">
                <div class="step-name">优化持仓</div>
                <div class="step-desc">自动生成优化后的持仓配置</div>
            </div>
        </div>
        <div class="pipeline-step">
            <div class="step-num">7</div>
            <div class="step-info">
                <div class="step-name">每日调仓信号</div>
                <div class="step-desc">抓取基金重大变动，对照持仓输出信号</div>
            </div>
        </div>
    </div>
</div>

</div>

<script>
function onDateChange(date) {
    // 静态站点：切换日期时回到首页（静态站点只生成当天数据）
    window.location = 'index.html' + (date ? '?date=' + date : '');
}
</script>

</body>
</html>
