<script>
function onDateChange(date) {
    // 静态站点：保持当前页面，仅更新日期参数
    var currentPage = window.location.pathname.split('/').pop() || 'index.html';
    window.location = currentPage + '?date=' + date;
}
</script>

<script>
async function reOptimize() {
    document.getElementById('optimize-form').style.display = 'block';
}
async function runOptimize(e) {
    e.preventDefault();
    const logEl = document.getElementById('optimize-log');
    logEl.style.display = 'block';
    logEl.textContent = '运行中...\n';
    const form = e.target;
    const body = new FormData(form);
    const resp = await fetch('/api/run/optimize', { method: 'POST', body });
    const data = await resp.json();
    const taskId = data.task_id;
    const poll = setInterval(async () => {
        const r = await fetch(`/api/run/status/${taskId}`);
        const t = await r.json();
        logEl.textContent = t.log_lines.join('\n');
        if (t.status === 'done' || t.status === 'failed') {
            clearInterval(poll);
            if (t.status === 'done') location.reload();
        }
    }, 500);
}
</script>
