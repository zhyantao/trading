<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}量化交易研究{% endblock %}</title>
    <link rel="stylesheet" href="style.css">
    {% block head %}{% endblock %}
</head>
<body>

<nav>
    <div class="nav-inner">
        <span class="brand">量化信号</span>
        <input type="checkbox" id="nav-toggle">
        <label for="nav-toggle" class="nav-toggle-btn" aria-label="菜单">
            <span></span><span></span><span></span>
        </label>
        <div class="nav-links">
            <a href="index.html" class="{{ 'active' if active_page == 'dashboard' }}">总览</a>
            <a href="signals.html" class="{{ 'active' if active_page == 'signals' }}">每日信号</a>
            <a href="holdings.html" class="{{ 'active' if active_page == 'holdings' }}">我的持仓</a>
            <a href="managers.html" class="{{ 'active' if active_page == 'managers' }}">经理排名</a>
            <a href="funds.html" class="{{ 'active' if active_page == 'funds' }}">基金排名</a>
            <a href="elite.html" class="{{ 'active' if active_page == 'elite' }}">绩优标的</a>
            <a href="backtest.html" class="{{ 'active' if active_page == 'backtest' }}">回测</a>
            <a href="pipeline.html" class="{{ 'active' if active_page == 'pipeline' }}">流水线</a>
        </div>
        {% if available_dates %}
        <select id="date-select" class="nav-date-select" onchange="onDateChange(this.value)" aria-label="选择数据日期">
            <option value="">📅 最新</option>
            {% for d in available_dates %}
            <option value="{{ d }}" {{ 'selected' if d == selected_date }}>{{ d[:4] }}-{{ d[4:6] }}-{{ d[6:8] }}</option>
            {% endfor %}
        </select>
        {% endif %}
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<script>
function onDateChange(date) {
    // 静态站点：切换日期时回到首页（静态站点只生成当天数据）
    window.location = 'index.html' + (date ? '?date=' + date : '');
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
