<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}量化交易研究{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    {% block head %}{% endblock %}
</head>
<body>

<nav>
    <div class="nav-inner">
        <span class="brand">量化信号</span>
        <a href="/" class="{{ 'active' if active_page == 'dashboard' }}">总览</a>
        <a href="/signals" class="{{ 'active' if active_page == 'signals' }}">每日信号</a>
        <a href="/holdings" class="{{ 'active' if active_page == 'holdings' }}">我的持仓</a>
        <a href="/managers" class="{{ 'active' if active_page == 'managers' }}">经理排名</a>
        <a href="/funds" class="{{ 'active' if active_page == 'funds' }}">基金排名</a>
        <a href="/elite" class="{{ 'active' if active_page == 'elite' }}">绩优标的</a>
        <a href="/backtest" class="{{ 'active' if active_page == 'backtest' }}">回测</a>
        <a href="/pipeline" class="{{ 'active' if active_page == 'pipeline' }}">流水线</a>
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

{% block scripts %}{% endblock %}
</body>
</html>
